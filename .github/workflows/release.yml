name: Release

# THE publish door for the Swift SDK. Runs in the PUBLIC repo (crossdeck-swift)
# on a version-tag push. SwiftPM has no registry publish — consumers resolve
# directly from the git tag — so "publishing" is: gate + build + test + cut a
# GitHub release for the tag. No npm, no token, no one-time-pin.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Version gate — _Version.swift must match the tag
        run: |
          LIT="$(grep -oE 'public static let version[[:space:]]*=[[:space:]]*"[^"]+"' Sources/Crossdeck/_Version.swift | grep -oE '"[^"]+"' | tr -d '"')"
          if [ "$LIT" != "$VERSION" ]; then
            echo "::error::_Version.swift version $LIT does not match tag v$VERSION"; exit 1
          fi

      - name: Changelog gate — CHANGELOG.md must have an entry for this version
        run: |
          if ! grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md entry '## [${VERSION}]' — refuse to release an undocumented version."; exit 1
          fi

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: GitHub release (SPM resolves from this tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "@cross-deck/swift ${{ github.ref_name }}"
          generate_release_notes: true

      - name: Record published version in /v1/sdk/versions
        env:
          MANIFEST_WRITE_TOKEN: ${{ secrets.SDK_MANIFEST_WRITE_TOKEN }}
        run: |
          # Best-effort — see web/release.yml. A missing endpoint/token must not
          # fail a successful release; the committed seed is authoritative.
          curl -fsS -X POST "https://api.cross-deck.com/v1/internal/sdk-versions" \
            -H "Authorization: Bearer ${MANIFEST_WRITE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"surface\":\"swift\",\"version\":\"${VERSION}\"}" \
            && echo "manifest updated: swift@${VERSION}" \
            || echo "::warning::manifest write-back deferred — /v1/sdk/versions seed covers it"
